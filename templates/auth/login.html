{% extends "base.html" %}
{% block title %}Login Admin &middot; Parkir Kampus{% endblock %}

{% block content %}
<div class="login-shell">
  <div class="login-card">
    <span class="brand-badge">P</span>
    <h1>Login Admin</h1>
    <p class="lead">Masuk untuk mengelola data kendaraan, area, dan transaksi parkir.</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn--accent btn--block">Login</button>
    </form>
  </div>
</div>
{% endblock %}
